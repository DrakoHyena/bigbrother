<html>

<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/gh/msqr1/Vosklet@1.2.1/Examples/Vosklet.js" async defer></script>
</head>

<body>
    <script src="/index.js" defer type="module"></script>

    <canvas id="displayCanvas"></canvas>

    <div id="htmlContainer">
        <fieldset class="outputBox" id="voiceContainer">
            <legend>Big Brother's Ears</legend>
        </fieldset>
        <fieldset class="outputBox" id="processingContainer">
            <legend>Big Brother's Brain</legend>
        </fieldset>
        <fieldset class="outputBox" id="textContainer">
            <legend>Big Brother's Voice</legend>
        </fieldset>
        <fieldset class="outputBox" id="imageContainer">
            <legend>Big Brother's Eyes</legend>
        </fieldset>
    </div>

    <div id="loadingDiv" class="loadingScreen">
        <h1>Big Brother will arrive soon...</h1>
        <h5 id="statusText">Loading assets</h5>
        <h6 id="subStatusText">(0)</h6>
    </div>
</body>

</html>
